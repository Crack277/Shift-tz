services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5438:5432"

  app:
    build: .
    container_name: shift_app
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - "8000:8000"